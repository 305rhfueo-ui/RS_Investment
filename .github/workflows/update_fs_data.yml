name: Update FS Data

on:
  schedule:
    # 매일 01:00 UTC에 실행 (한국 시간 오전 10시)
    - cron: '0 1 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 저장소 쓰기 권한 필요

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pandas requests beautifulsoup4 lxml

    - name: Run fetch FS script
      run: python fetch_fs_data.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git pull --rebase
        git add static/fs_data.json
        # 변경사항이 있을 때만 커밋
        git commit -m "Auto-update FS Data (Today's List): $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
